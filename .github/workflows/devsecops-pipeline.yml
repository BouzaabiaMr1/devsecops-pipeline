name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOJO_URL:     ${{ secrets.DOJO_URL }}
  DOJO_API_KEY: ${{ secrets.DOJO_API_KEY }}
  DOJO_PRODUCT: "VulnFlask"
  IMAGE_NAME:   "vulnflask"
  IMAGE_TAG:    "latest"

jobs:
  dojo-setup:
    name: "DefectDojo — Setup"
    runs-on: ubuntu-latest
    outputs:
      engagement_id: ${{ steps.setup.outputs.engagement_id }}
      product_id:    ${{ steps.setup.outputs.product_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Create product & engagement in DefectDojo
        id: setup
        run: |
          mkdir -p results
          python scripts/defectdojo/defectdojo_api.py --action setup
          source results/dojo_ids.env
          echo "product_id=${DOJO_PRODUCT_ID}" >> $GITHUB_OUTPUT
          echo "engagement_id=${DOJO_ENGAGEMENT_ID}" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: dojo-ids
          path: results/dojo_ids.env

  sast-bandit:
    name: "SAST — Bandit"
    runs-on: ubuntu-latest
    needs: dojo-setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit requests
      - name: Run Bandit scan
        run: |
          mkdir -p results
          bandit -r app/ -f json -o results/bandit.json --severity-level low --confidence-level low || true
      - name: Import to DefectDojo
        run: python scripts/defectdojo/defectdojo_api.py --action import --scan-type bandit --file results/bandit.json --engagement-id ${{ needs.dojo-setup.outputs.engagement_id }}
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: results/bandit.json

  sast-semgrep:
    name: "SAST — Semgrep"
    runs-on: ubuntu-latest
    needs: dojo-setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install semgrep requests
      - name: Run Semgrep scan
        run: |
          mkdir -p results
          semgrep scan --config=auto --json --output results/semgrep.json app/ || true
      - name: Import to DefectDojo
        run: python scripts/defectdojo/defectdojo_api.py --action import --scan-type semgrep --file results/semgrep.json --engagement-id ${{ needs.dojo-setup.outputs.engagement_id }}
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: results/semgrep.json

  secrets-scan:
    name: "Secrets — TruffleHog"
    runs-on: ubuntu-latest
    needs: dojo-setup
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        run: |
          mkdir -p results
          docker run --rm -v "$PWD:/pwd" trufflesecurity/trufflehog:latest filesystem /pwd --json --no-update > results/trufflehog.json 2>/dev/null || true
          wc -l results/trufflehog.json || echo "No findings"
      - name: Import to DefectDojo
        run: |
          pip install requests
          if [ -s results/trufflehog.json ]; then
            python scripts/defectdojo/defectdojo_api.py --action import --scan-type trufflehog --file results/trufflehog.json --engagement-id ${{ needs.dojo-setup.outputs.engagement_id }}
          else
            echo "No secrets found - skipping import"
          fi

  sca-dependencies:
    name: "SCA — pip-audit"
    runs-on: ubuntu-latest
    needs: dojo-setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit requests
      - name: Run pip-audit
        run: |
          mkdir -p results
          pip-audit -r app/requirements.txt --format json --output results/pip-audit.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: results/pip-audit.json

  container-scan:
    name: "Container — Trivy"
    runs-on: ubuntu-latest
    needs: dojo-setup
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          mkdir -p $GITHUB_WORKSPACE/results
          docker build -t vulnflask:latest app/
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Run Trivy scan
        run: |
          trivy image --format json --output $GITHUB_WORKSPACE/results/trivy.json --severity CRITICAL,HIGH,MEDIUM,LOW --exit-code 0 vulnflask:latest
          ls -lh $GITHUB_WORKSPACE/results/trivy.json
      - name: Import to DefectDojo
        run: |
          pip install requests
          python scripts/defectdojo/defectdojo_api.py --action import --scan-type trivy --file $GITHUB_WORKSPACE/results/trivy.json --engagement-id ${{ needs.dojo-setup.outputs.engagement_id }}
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: ${{ github.workspace }}/results/trivy.json

  dast-zap:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    needs: [dojo-setup, container-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Start VulnFlask
        run: |
          docker build -t vulnflask:latest app/
          docker run -d --name vulnflask -p 5000:5000 vulnflask:latest
          sleep 8
          curl -s http://localhost:5000/health || echo "App starting..."
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: "http://localhost:5000"
          fail_action: false
          cmd_options: "-J zap.json"
      - name: Move ZAP results
        run: |
          mkdir -p $GITHUB_WORKSPACE/results
          mv zap.json $GITHUB_WORKSPACE/results/zap.json || true
      - name: Import to DefectDojo
        run: |
          pip install requests
          if [ -f $GITHUB_WORKSPACE/results/zap.json ]; then
            python scripts/defectdojo/defectdojo_api.py --action import --scan-type zap --file $GITHUB_WORKSPACE/results/zap.json --engagement-id ${{ needs.dojo-setup.outputs.engagement_id }}
          fi
      - name: Stop VulnFlask
        if: always()
        run: docker stop vulnflask && docker rm vulnflask || true

  pipeline-summary:
    name: "Pipeline — Summary"
    runs-on: ubuntu-latest
    needs: [sast-bandit, sast-semgrep, secrets-scan, sca-dependencies, container-scan, dast-zap]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Print findings summary
        run: |
          PID="${{ needs.dojo-setup.outputs.product_id }}"
          if [ -n "$PID" ]; then
            python scripts/defectdojo/defectdojo_api.py --action findings --product-id "$PID"
          else
            echo "Skipping - no product ID"
          fi
      - name: GitHub Step Summary
        run: |
          echo "## DevSecOps Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SAST Bandit        | ${{ needs.sast-bandit.result }}      |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST Semgrep       | ${{ needs.sast-semgrep.result }}     |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets TruffleHog | ${{ needs.secrets-scan.result }}     |" >> $GITHUB_STEP_SUMMARY
          echo "| SCA pip-audit      | ${{ needs.sca-dependencies.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Trivy    | ${{ needs.container-scan.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST ZAP           | ${{ needs.dast-zap.result }}         |" >> $GITHUB_STEP_SUMMARY
